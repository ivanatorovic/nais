version: '3'

services:
  workflow-neo4j:
    image: neo4j
    container_name: workflow-neo4j
    ports:
    - "7475:7474"
    - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/workflow
    volumes:
      - ./workflow-data:/data

  neo4j:
    image: neo4j
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./data:/data